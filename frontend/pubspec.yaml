name: blind_assist_ai
description: Voice-first accessibility assistant for blind users.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.9.0
  flutter_tts: ^4.2.3
  speech_to_text: ^7.2.0
  geolocator: ^14.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  camera: ^0.11.2
  permission_handler: ^12.0.1
  battery_plus: ^6.0.0
  google_mlkit_object_detection: ^0.15.1
  google_mlkit_commons: ^0.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
